name: CI

on:
  push:
    branches:
      - '**'

  pull_request:

  workflow_dispatch:
env:
  NEXT_TELEMETRY_DISABLED: "1"
  REGISTRY: ghcr.io

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "example-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "example-service-role-key"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
      BETTER_STACK_SOURCE_TOKEN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web-client
        run: npm run lint -w web-client

      - name: Type check web-client
        run: npm run typecheck -w web-client

      - name: Build web-client
        run: npm run build -w web-client

  backend-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "example-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "example-service-role-key"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
      BETTER_STACK_SOURCE_TOKEN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web-admin
        run: npm run lint -w web-admin

      - name: Type check web-admin
        run: npm run typecheck -w web-admin

      - name: Build web-admin
        run: npm run build -w web-admin

  docker-build:
    environment: environment
    needs:
      - frontend-ci
      - backend-ci
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'example-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SUPABASE_SERVICE_ROLE_KEY || 'example-service-role-key' }}
      SENTRY_DSN: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SENTRY_DSN || '' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}
      BETTER_STACK_SOURCE_TOKEN: ""
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase the repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Check Sentry secrets
        run: |
          echo "TOKEN=$([[ -n \"$SENTRY_AUTH_TOKEN\" ]] && echo SET || echo EMPTY)"
          echo "ORG=$([[ -n \"$SENTRY_ORG\" ]] && echo SET || echo EMPTY)"
          echo "CLIENT=$([[ -n \"$SENTRY_PROJECT_CLIENT\" ]] && echo SET || echo EMPTY)"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT_CLIENT: ${{ secrets.SENTRY_PROJECT_CLIENT }}

      - name: Debug Sentry in build context
        run: |
          node -e "console.log('ORG', process.env.SENTRY_ORG)"
          node -e "console.log('PROJECT', process.env.SENTRY_PROJECT_CLIENT)"
          node -e "console.log('TOKEN', !!process.env.SENTRY_AUTH_TOKEN)"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT_CLIENT: ${{ secrets.SENTRY_PROJECT_CLIENT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (web-client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}/web-client
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and push web-client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web-client/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ env.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_DSN=${{ env.SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT_CLIENT=${{ secrets.SENTRY_PROJECT_CLIENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (web-admin)
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}/web-admin
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and push web-admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web-admin/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ env.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_DSN=${{ env.SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT_ADMIN=${{ secrets.SENTRY_PROJECT_ADMIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
