name: Simulated CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    # Only run this if the CI workflow actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: environment 

    steps:
      - name: Simulate CD Deployment after CI Success
        run: |
          echo "Initiating simulated deployment..."

          echo "⬇Pulling the latest images:"
          echo "   - ghcr.io/${{ github.repository }}/web-client:main"
          echo "   - ghcr.io/${{ github.repository }}/web-admin:main"
          
          echo "Simulated deployment completed successfully! Your local app is ready for manual update."