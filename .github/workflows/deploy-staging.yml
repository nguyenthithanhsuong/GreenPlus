name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images for staging
        run: |
          docker buildx build \
            --file web-client/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web-client:staging \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web-client:develop \
            --push \
            .
          
          docker buildx build \
            --file web-admin/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web-admin:staging \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web-admin:develop \
            --push \
            .

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          # TODO: Add your deployment commands here
          # Example: kubectl set image deployment/web-client web-client=ghcr.io/... -n staging
          # Or use your preferred deployment tool (docker-compose, AWS ECS, etc.)

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deployment complete"
          # TODO: Add Slack/email notification
