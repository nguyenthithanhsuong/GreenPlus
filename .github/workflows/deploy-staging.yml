name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  NEXT_PUBLIC_SENTRY_DSN_CLIENT: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_CLIENT }}
  SENTRY_DSN_CLIENT: ${{ secrets.SENTRY_DSN_CLIENT }}
  NEXT_PUBLIC_SENTRY_DSN_ADMIN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_ADMIN }}
  SENTRY_DSN_ADMIN: ${{ secrets.SENTRY_DSN_ADMIN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT_ADMIN: ${{ secrets.SENTRY_PROJECT_ADMIN }}
  SENTRY_PROJECT_CLIENT: ${{ secrets.SENTRY_PROJECT_CLIENT }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: environment
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sets up Buildx so Docker can build advanced multi-platform/cached images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Converts repository name to lowercase safely to avoid registry errors
      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically generates the tags and labels you requested
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Clean, native approach using GitHub Actions to Build and Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web-admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN_CLIENT=${{ env.NEXT_PUBLIC_SENTRY_DSN_CLIENT }}
            SENTRY_DSN_CLIENT=${{ env.SENTRY_DSN_CLIENT }}
            NEXT_PUBLIC_SENTRY_DSN_ADMIN=${{ env.NEXT_PUBLIC_SENTRY_DSN_ADMIN }}
            SENTRY_DSN_ADMIN=${{ env.SENTRY_DSN_ADMIN }}
            SENTRY_AUTH_TOKEN=${{ env.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ env.SENTRY_ORG }}
            SENTRY_PROJECT_ADMIN=${{ env.SENTRY_PROJECT_ADMIN }}
            SENTRY_PROJECT_CLIENT=${{ env.SENTRY_PROJECT_CLIENT }}

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          # TODO: Add your deployment commands here

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deployment complete"