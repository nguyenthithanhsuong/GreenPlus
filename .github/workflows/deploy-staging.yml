name: Deploy to Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT_ADMIN: ${{ secrets.SENTRY_PROJECT_ADMIN }}
  SENTRY_PROJECT_CLIENT: ${{ secrets.SENTRY_PROJECT_CLIENT }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: environment
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images for staging
        run: |
          docker buildx build \
             --file web-admin/Dockerfile \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ env.NEXT_PUBLIC_SUPABASE_URL }}" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              --build-arg SUPABASE_SERVICE_ROLE_KEY="${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
              --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ env.NEXT_PUBLIC_SENTRY_DSN }}" \
              --build-arg SENTRY_DSN="${{ env.SENTRY_DSN }}" \
              --build-arg SENTRY_AUTH_TOKEN="${{ env.SENTRY_AUTH_TOKEN }}" \
              --build-arg SENTRY_ORG="${{ env.SENTRY_ORG }}" \
              --build-arg SENTRY_PROJECT_ADMIN="${{ env.SENTRY_PROJECT_ADMIN }}" \
              --build-arg SENTRY_PROJECT_CLIENT="${{ env.SENTRY_PROJECT_CLIENT }}" \
              --tags: |
                  type=ref,event=branch
                  type=sha
                  type=raw,value=latest,enable={{is_default_branch}}
              --push \
            .
          
          docker buildx build \
            --file web-admin/Dockerfile \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ env.NEXT_PUBLIC_SUPABASE_URL }}" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              --build-arg SUPABASE_SERVICE_ROLE_KEY="${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
              --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ env.NEXT_PUBLIC_SENTRY_DSN }}" \
              --build-arg SENTRY_DSN="${{ env.SENTRY_DSN }}" \
              --build-arg SENTRY_AUTH_TOKEN="${{ env.SENTRY_AUTH_TOKEN }}" \
              --build-arg SENTRY_ORG="${{ env.SENTRY_ORG }}" \
              --build-arg SENTRY_PROJECT_ADMIN="${{ env.SENTRY_PROJECT_ADMIN }}" \
              --build-arg SENTRY_PROJECT_CLIENT="${{ env.SENTRY_PROJECT_CLIENT }}" \
              --tags: |
                  type=ref,event=branch
                  type=sha
                  type=raw,value=latest,enable={{is_default_branch}}
              --push \
            .

      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          # TODO: Add your deployment commands here
          # Example: kubectl set image deployment/web-client web-client=ghcr.io/... -n staging
          # Or use your preferred deployment tool (docker-compose, AWS ECS, etc.)

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deployment complete"
          # TODO: Add Slack/email notification
