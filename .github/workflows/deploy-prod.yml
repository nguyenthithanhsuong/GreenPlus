name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT_ADMIN: ${{ secrets.SENTRY_PROJECT_ADMIN }}
  SENTRY_PROJECT_CLIENT: ${{ secrets.SENTRY_PROJECT_CLIENT }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: environment
    permissions:
      contents: write # Upgraded to 'write' to allow creating GitHub Releases
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates tags, INCLUDING the custom ref_name-sha tag needed for your Release step
      # Appends '/web-admin' to the image name to match your release notes
      - name: Extract Docker metadata for web-admin
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/web-admin
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}-${{ github.sha }}

      - name: Build and push web-admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web-admin/Dockerfile
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ env.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_DSN=${{ env.SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ env.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ env.SENTRY_ORG }}
            SENTRY_PROJECT_ADMIN=${{ env.SENTRY_PROJECT_ADMIN }}
            SENTRY_PROJECT_CLIENT=${{ env.SENTRY_PROJECT_CLIENT }}

      # NOTE: To build web-client, duplicate the two steps above ("Extract Docker metadata..." and "Build and push...")
      # changing the ID, file path, and image names to 'web-client'.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}-${{ github.sha }}
          body: |
            Production deployment
            - web-client: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/web-client:${{ github.ref_name }}-${{ github.sha }}
            - web-admin: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}/web-admin:${{ github.ref_name }}-${{ github.sha }}

      - name: Deploy to production environment
        run: |
          echo "Deploying to production..."
          # TODO: Add your deployment commands here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # TODO: Add health checks and smoke tests

      - name: Notify deployment
        if: always()
        run: |
          echo "Production deployment complete"