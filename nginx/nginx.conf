upstream web_client_upstream {
  server web-client:3000;
}

upstream web_admin_upstream {
  server web-admin:3001;
}

# API Gateway with path-based routing
server {
  listen 80;
  server_name _;

  # Health check endpoint for uptime monitoring
  location /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  # Admin panel routes
  location /admin/ {
    proxy_pass http://web_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Original-Path $request_uri;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Rewrite the path for Next.js app
    rewrite ^/admin/(.*) /$1 break;
  }

  # API routes (can be handled by either app or dedicated backend)
  location /api/ {
    # Route to web-admin for now (adjust based on your API structure)
    proxy_pass http://web_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Client routes (default catch-all)
  location / {
    proxy_pass http://web_client_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
